services:
  app:
    build: .
    env_file: .env
    entrypoint: .docker/entrypoint.sh
    container_name: prismaapi-app
    ports:
      - '3000:3000'
      - '5555:5555'
    volumes:
      - .:/home/node/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: prismaapi-db
    restart: always
    tty: true
    ports:
      - '5432:5432'
    volumes:
      - .docker/dbdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: prismaapi